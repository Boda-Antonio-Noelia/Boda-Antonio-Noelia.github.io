<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invitación boda</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Parisienne&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body class="intro-lock">

  <div class="intro-overlay" id="introOverlay">
    <div class="envelope-scene">
      <div class="envelope">

        <img class="envelope-bottom-img" src="img/abajo.png" alt="Base del sobre">
        <img class="envelope-top-img" src="img/arriba.png" alt="Solapa del sobre">

        <div class="intro-names">
          Antonio <span>&</span> Noelia
        </div>

        <img class="seal" src="img/sello.png" alt="Sello con iniciales">
      </div>
    </div>
  </div>

  <div class="fixed-background"></div>

  <div class="site-content">
    <section class="hero">
      <div class="hero-inner">
        <h1>Es para nosotros un placer invitarte a nuestra boda</h1>
        <p>
          Muy pronto compartiremos con vosotros uno de los días más especiales de nuestra vida.
        </p>
      </div>
    </section>

    <section class="content-section">
      <div class="content-inner">
        <div class="intro-card">
          <p>
            Aquí empezará el contenido real de la web: fecha, lugar, cronograma, confirmación y todo lo que quieras añadir.
          </p>
        </div>
      </div>
    </section>
  </div>

  <script>
    window.addEventListener("load", () => {
      const overlay = document.getElementById("introOverlay");

      setTimeout(() => {
        overlay.classList.add("play");
      }, 150);

      setTimeout(() => {
        document.body.classList.remove("intro-lock");
      }, 5000);

      setTimeout(() => {
        overlay.classList.add("hide");
      }, 5400);
    });
  </script>
</body>
</html>
